name: Build and Push Backend

on:
  push:
    branches: [ "*", "./feature/**" ] # Se activa cada vez que subes a main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21 ☕
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Esto acelera los futuros despliegues


      - name: Excute Tests
        if: "!contains(github.event.head_commit.message, '#skiptest')"
        run: |
          chmod +x mvnw
          ./mvnw test

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Package
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: . # Tu carpeta de Spring Boot
          push: true
          tags: ikeragi05/project-manager-api:latest
